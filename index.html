<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1f4e5a">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; media-src 'self' data:; script-src 'self' 'unsafe-inline'; connect-src 'self'">
<title>Ballycrann</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Atkinson+Hyperlegible:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #f3e9d2;
    --cream-light: #faf3e3;
    --teal: #1f4e5a;
    --teal-deep: #163841;
    --gold: #c08a3e;
    --gold-soft: #e6b864;
    --brown: #3a2e1f;
    --brown-soft: #5a4a37;
  }

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
height: 100%;
overflow: hidden;
overscroll-behavior: none;
-webkit-user-select: none;
user-select: none;
-webkit-tap-highlight-color: transparent;
touch-action: none;
}

body {
font-family: 'Atkinson Hyperlegible', sans-serif;
background: var(--cream);
color: var(--brown);
background-image:
radial-gradient(at 20% 15%, rgba(192, 138, 62, 0.10) 0%, transparent 45%),
radial-gradient(at 85% 85%, rgba(31, 78, 90, 0.08) 0%, transparent 45%);
}

#app {
height: 100vh;
height: 100dvh;
display: flex;
flex-direction: column;
padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
}

/* ––––– Start screen ––––– */
.start-screen {
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
flex: 1;
text-align: center;
padding: 2rem;
gap: 2.5rem;
}
.start-screen .title {
font-family: 'Fraunces', serif;
font-weight: 600;
font-size: clamp(2.5rem, 11vw, 3.5rem);
line-height: 1;
color: var(--teal-deep);
font-variation-settings: 'opsz' 144;
letter-spacing: -0.02em;
}
.start-screen .subtitle {
font-family: 'Fraunces', serif;
font-size: 1.15rem;
font-style: italic;
color: var(--brown-soft);
margin-top: 0.5rem;
}
.start-button {
font-family: 'Atkinson Hyperlegible', sans-serif;
font-weight: 700;
font-size: 1.3rem;
padding: 1.2rem 3rem;
background: var(--teal);
color: var(--cream-light);
border: none;
border-radius: 999px;
cursor: pointer;
box-shadow: 0 6px 24px rgba(31, 78, 90, 0.3);
transition: transform 0.15s, box-shadow 0.15s;
}
.start-button:active {
transform: translateY(2px);
box-shadow: 0 2px 10px rgba(31, 78, 90, 0.25);
}
.start-note {
max-width: 20rem;
font-size: 0.9rem;
color: var(--brown-soft);
line-height: 1.5;
}

/* ––––– Game screen ––––– */
.game-screen {
display: none;
flex-direction: column;
flex: 1;
}
.chapter-header {
text-align: center;
padding: 0.9rem 1rem 0.7rem;
border-bottom: 1px solid rgba(58, 46, 31, 0.12);
}
.chapter-label {
font-family: 'Fraunces', serif;
font-style: italic;
font-size: 0.85rem;
color: var(--brown-soft);
letter-spacing: 0.02em;
}
.chapter-title {
font-family: 'Fraunces', serif;
font-weight: 600;
font-size: 1.4rem;
color: var(--teal-deep);
}

.play-area {
flex: 1;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
padding: 2rem 1.5rem;
text-align: center;
touch-action: none;
position: relative;
overflow: hidden;
}
.instruction {
font-family: 'Fraunces', serif;
font-weight: 500;
font-size: clamp(1.4rem, 5vw, 1.9rem);
line-height: 1.35;
color: var(--teal-deep);
max-width: 22rem;
}
.hint {
margin-top: 1.2rem;
font-size: 1rem;
color: var(--brown-soft);
font-style: italic;
min-height: 1.4em;
}
.speaking-indicator {
margin-top: 2rem;
display: flex;
gap: 6px;
height: 1.5rem;
align-items: flex-end;
opacity: 0;
transition: opacity 0.3s;
}
.speaking-indicator.active { opacity: 0.7; }
.speaking-indicator span {
width: 5px;
background: var(--teal);
border-radius: 3px;
animation: bounce 1s ease-in-out infinite;
}
.speaking-indicator span:nth-child(1) { height: 0.6rem; animation-delay: 0s; }
.speaking-indicator span:nth-child(2) { height: 1.2rem; animation-delay: 0.15s; }
.speaking-indicator span:nth-child(3) { height: 0.8rem; animation-delay: 0.3s; }
@keyframes bounce {
0%, 100% { transform: scaleY(0.4); }
50% { transform: scaleY(1); }
}

.play-area.success::before {
content: '';
position: absolute;
inset: 0;
background: radial-gradient(circle, rgba(230, 184, 100, 0.35) 0%, transparent 65%);
animation: flash 0.7s ease-out;
pointer-events: none;
}
@keyframes flash {
0%   { opacity: 0; transform: scale(0.7); }
50%  { opacity: 1; transform: scale(1.0); }
100% { opacity: 0; transform: scale(1.25); }
}

.scrapbook-bar {
padding: 0.8rem 1rem;
text-align: center;
font-size: 0.9rem;
color: var(--brown-soft);
border-top: 1px solid rgba(58, 46, 31, 0.12);
background: rgba(250, 243, 227, 0.5);
}
.scrapbook-bar .streak { color: var(--gold); font-weight: 700; }

/* ––––– Complete screen ––––– */
.complete-screen {
display: none;
flex-direction: column;
align-items: center;
justify-content: center;
flex: 1;
padding: 2rem;
text-align: center;
gap: 1.5rem;
}
.scroll {
background: var(--cream-light);
border: 1px solid rgba(192, 138, 62, 0.35);
border-radius: 12px;
padding: 2rem 1.5rem;
max-width: 22rem;
box-shadow: 0 6px 28px rgba(58, 46, 31, 0.10);
}
.scroll h3 {
font-family: 'Fraunces', serif;
font-weight: 600;
color: var(--teal-deep);
margin-bottom: 1rem;
font-size: 1.3rem;
}
.scroll ul {
list-style: none;
text-align: left;
}
.scroll li {
font-family: 'Fraunces', serif;
font-style: italic;
color: var(--brown);
line-height: 1.6;
padding: 0.4rem 0;
border-bottom: 1px dashed rgba(192, 138, 62, 0.25);
}
.scroll li:last-child { border-bottom: none; }
.replay-button {
font-family: 'Atkinson Hyperlegible', sans-serif;
font-weight: 700;
padding: 1rem 2.2rem;
background: var(--gold);
color: var(--cream-light);
border: none;
border-radius: 999px;
font-size: 1rem;
cursor: pointer;
box-shadow: 0 4px 16px rgba(192, 138, 62, 0.35);
}
.replay-button:active { transform: translateY(2px); }

.complete-heading {
text-align: center;
}
.complete-heading .title {
font-family: 'Fraunces', serif;
font-weight: 600;
font-size: clamp(2.5rem, 11vw, 3.5rem);
line-height: 1;
color: var(--teal-deep);
font-variation-settings: 'opsz' 144;
letter-spacing: -0.02em;
}
.complete-heading .subtitle {
font-family: 'Fraunces', serif;
font-size: 1.05rem;
font-style: italic;
color: var(--brown-soft);
margin-top: 0.5rem;
}

/* Complete screen actions */
.complete-actions {
display: flex;
flex-direction: column;
align-items: center;
gap: 0.4rem;
}
.wander-button {
font-family: 'Atkinson Hyperlegible', sans-serif;
font-weight: 700;
padding: 1.15rem 2.6rem;
background: var(--teal);
color: var(--cream-light);
border: none;
border-radius: 999px;
font-size: 1.15rem;
cursor: pointer;
box-shadow: 0 6px 24px rgba(31, 78, 90, 0.3);
}
.wander-button:active { transform: translateY(2px); }
.replay-link {
font-family: 'Atkinson Hyperlegible', sans-serif;
font-size: 0.92rem;
color: var(--brown-soft);
background: transparent;
border: none;
padding: 0.5rem 1rem;
cursor: pointer;
text-decoration: underline;
font-style: italic;
}

/* Wander mode footer (replaces scrapbook bar in wander) */
.wander-footer {
padding: 0.75rem 1rem;
text-align: center;
border-top: 1px solid rgba(58, 46, 31, 0.12);
background: rgba(250, 243, 227, 0.5);
}
.wander-done {
font-family: 'Atkinson Hyperlegible', sans-serif;
font-weight: 400;
font-style: italic;
font-size: 0.95rem;
color: var(--brown-soft);
background: transparent;
border: none;
padding: 0.5rem 1.4rem;
cursor: pointer;
text-decoration: underline;
}
body.is-wander #scrapbookBar { display: none; }
body:not(.is-wander) #wanderFooter { display: none; }
body.is-wander .instruction {
max-width: 26rem;
font-size: clamp(1.15rem, 4.3vw, 1.55rem);
line-height: 1.4;
}

body.in-game .start-screen { display: none; }
body.in-game .game-screen { display: flex; }
body.complete .game-screen { display: none; }
body.complete .complete-screen { display: flex; }
</style>

</head>
<body>
<div id="app">

  <div class="start-screen" id="startScreen">
    <div>
      <div class="title">Ballycrann</div>
      <div class="subtitle">Tutorial · A Morning Walk</div>
    </div>
    <button class="start-button" id="startBtn">Begin</button>
    <div class="start-note">
      Best with VoiceOver turned off — the app will speak to you.
      Tap anywhere on the screen to begin, then follow Mary's voice.
    </div>
  </div>

  <div class="game-screen" id="gameScreen">
    <div class="chapter-header">
      <div class="chapter-label">Tutorial</div>
      <div class="chapter-title">A Morning Walk</div>
    </div>
    <div class="play-area" id="playArea">
      <div class="instruction" id="instruction">Listen…</div>
      <div class="hint" id="hint"></div>
      <div class="speaking-indicator" id="speakingIndicator">
        <span></span><span></span><span></span>
      </div>
    </div>
    <div class="scrapbook-bar" id="scrapbookBar">
      Scrapbook empty · Streak: <span class="streak">0</span>
    </div>
    <div class="wander-footer" id="wanderFooter">
      <button class="wander-done" id="wanderDoneBtn">Done wandering</button>
    </div>
  </div>

  <div class="complete-screen" id="completeScreen">
    <div class="complete-heading">
      <div class="title">Ballycrann</div>
      <div class="subtitle">Anytime you like</div>
    </div>
    <div class="scroll" id="scrapbookScroll" hidden>
      <h3>From your morning walk</h3>
      <ul id="scrapbookList"></ul>
    </div>
    <div class="complete-actions">
      <button class="wander-button" id="wanderBtn">Wander again</button>
      <button class="replay-link" id="replayBtn">Or restart the tutorial</button>
    </div>
  </div>

</div>

function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}
function tone(freq, dur, type = 'sine', vol = 0.15, when = 0) {
  if (!audioCtx) return;
  const t = audioCtx.currentTime + when;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(0, t);
  gain.gain.linearRampToValueAtTime(vol, t + 0.02);
  gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
  osc.connect(gain).connect(audioCtx.destination);
  osc.start(t);
  osc.stop(t + dur + 0.05);
}
const audioBuffers = {};
async function loadSound(name, src) {
  try {
    ensureAudio();
    let arrayBuffer;
    if (src.startsWith('data:')) {
      const b64 = src.split(',')[1];
      const binary = atob(b64);
      const len = binary.length;
      const bytes = new Uint8Array(len);
      for (let i = 0; i < len; i++) bytes[i] = binary.charCodeAt(i);
      arrayBuffer = bytes.buffer;
    } else {
      const response = await fetch(src);
      if (!response.ok) return false;
      arrayBuffer = await response.arrayBuffer();
    }
    audioBuffers[name] = await audioCtx.decodeAudioData(arrayBuffer);
    return true;
  } catch (e) {
    return false;
  }
}
function playSound(name, vol = 0.85) {
  if (!audioBuffers[name] || !audioCtx) return false;
  try {
    const src = audioCtx.createBufferSource();
    const gain = audioCtx.createGain();
    gain.gain.value = vol;
    src.buffer = audioBuffers[name];
    src.connect(gain).connect(audioCtx.destination);
    src.start();
    return true;
  } catch (e) {
    return false;
  }
}
function preloadSounds() {
  Object.entries(SOUND_PATHS).forEach(([name, path]) => loadSound(name, path));
}

// -------- Speech --------
let preferredVoice = null;
function loadVoices() {
  if (!('speechSynthesis' in window)) return;
  const voices = speechSynthesis.getVoices();
  if (!voices.length) return;
  preferredVoice =
    voices.find(v => /Moira/i.test(v.name)) ||                              // Irish English on iOS, if downloaded
    voices.find(v => /en[-_]IE/i.test(v.lang)) ||
    voices.find(v => /en[-_]GB/i.test(v.lang) && /Karen|Serena|Kate|Daniel/i.test(v.name)) ||
    voices.find(v => /en[-_]GB/i.test(v.lang)) ||
    voices.find(v => /Samantha/i.test(v.name)) ||
    voices.find(v => /^en/i.test(v.lang)) ||
    voices[0];
}
if ('speechSynthesis' in window) {
  speechSynthesis.onvoiceschanged = loadVoices;
  loadVoices();
}
// -------- Line audio (ElevenLabs MP3s, fall back to speechSynthesis) --------
const LINES = {};
const linePromises = {};
let currentLineSource = null;
let speechGen = 0;

async function loadLines() {
  try {
    const res = await fetch('audio/lines.json');
    if (res.ok) Object.assign(LINES, await res.json());
  } catch (e) {}
}

function loadLineAudio(id) {
  if (audioBuffers[id]) return Promise.resolve(true);
  if (linePromises[id]) return linePromises[id];
  linePromises[id] = loadSound(id, `audio/${id}.mp3`);
  return linePromises[id];
}

function preloadAhead(ids) {
  for (const id of ids) loadLineAudio(id);
}

function cancelCurrent() {
  if ('speechSynthesis' in window) speechSynthesis.cancel();
  if (currentLineSource) {
    currentLineSource._cancelled = true;
    try { currentLineSource.stop(); } catch (e) {}
    currentLineSource = null;
  }
  const ind = document.getElementById('speakingIndicator');
  if (ind) ind.classList.remove('active');
}

function playLineBuffer(id, onEnd) {
  if (!audioBuffers[id] || !audioCtx) return false;
  const ind = document.getElementById('speakingIndicator');
  const src = audioCtx.createBufferSource();
  const gain = audioCtx.createGain();
  gain.gain.value = 1.0;
  src.buffer = audioBuffers[id];
  src.connect(gain).connect(audioCtx.destination);
  if (ind) ind.classList.add('active');
  src.onended = () => {
    if (ind) ind.classList.remove('active');
    if (currentLineSource === src) currentLineSource = null;
    if (!src._cancelled && onEnd) onEnd();
  };
  try { src.start(); } catch (e) { return false; }
  currentLineSource = src;
  return true;
}

function speak(text, onEnd) {
  if (!('speechSynthesis' in window)) { if (onEnd) setTimeout(onEnd, 1500); return; }
  const u = new SpeechSynthesisUtterance(text);
  if (preferredVoice) u.voice = preferredVoice;
  u.rate = 0.95;
  u.pitch = 1.0;
  u.volume = 1.0;
  const ind = document.getElementById('speakingIndicator');
  u.onstart = () => ind.classList.add('active');
  u.onend   = () => { ind.classList.remove('active'); if (onEnd) onEnd(); };
  u.onerror = () => { ind.classList.remove('active'); if (onEnd) onEnd(); };
  speechSynthesis.speak(u);
}

async function speakLine(id, onEnd) {
  const myGen = ++speechGen;
  cancelCurrent();

  const loaded = await loadLineAudio(id);
  if (myGen !== speechGen) return;

  if (loaded && audioBuffers[id]) {
    playLineBuffer(id, () => { if (myGen === speechGen && onEnd) onEnd(); });
    return;
  }

  const text = LINES[id];
  if (!text) { if (onEnd) onEnd(); return; }
  speak(text, () => { if (myGen === speechGen && onEnd) onEnd(); });
}

function speakSequence(ids, onEnd) {
  let i = 0;
  function next() {
    if (i >= ids.length) { if (onEnd) onEnd(); return; }
    speakLine(ids[i++], next);
  }
  next();
}

function cueId(target, isLast) {
  return isLast ? `cue-once-more-${target}` : `cue-again-${target}`;
}
function repromptId(target) { return `reprompt-${target}`; }
function almostId(target)   {
  if (target === 'double-tap') return 'almost-double-tap';
  return `almost-${target}`;
}

// -------- Ambient interior audio --------
// Per-clip volume + loop. Some clips (the kettle) have a natural finite arc
// — looping them feels wrong, so they play once and stop.
const ambientConfig = {
  'amb-bakery':    { volume: 0.35, loop: true  },
  'amb-bridie':    { volume: 0.15, loop: false },
  'amb-post':      { volume: 0.15, loop: true  },
  'amb-school':    { volume: 0.30, loop: true  },
  'amb-chapel':    { volume: 0.20, loop: true  },
  'amb-catherine': { volume: 0.15, loop: true  },
  'amb-pub':       { volume: 0.30, loop: true  }
};
let ambientSource = null;
let ambientGain = null;
function startAmbient(id) {
  stopAmbient();
  loadLineAudio(id).then(loaded => {
    if (!loaded || !audioBuffers[id] || !audioCtx) return;
    const cfg = ambientConfig[id] || {};
    const src = audioCtx.createBufferSource();
    const gain = audioCtx.createGain();
    gain.gain.value = 0.0;
    src.buffer = audioBuffers[id];
    src.loop = (cfg.loop !== false);
    src.connect(gain).connect(audioCtx.destination);
    const t = audioCtx.currentTime;
    const target = (cfg.volume !== undefined) ? cfg.volume : 0.20;
    gain.gain.linearRampToValueAtTime(target, t + 0.6);
    src.start();
    src.onended = () => {
      // For non-looping clips, clear the source reference once the clip ends
      // so stopAmbient() on later exit doesn't try to stop something already
      // stopped.
      if (ambientSource === src) { ambientSource = null; ambientGain = null; }
    };
    ambientSource = src;
    ambientGain = gain;
  });
}
function stopAmbient() {
  if (!ambientSource) return;
  const src = ambientSource;
  const gain = ambientGain;
  ambientSource = null;
  ambientGain = null;
  if (audioCtx && gain) {
    const t = audioCtx.currentTime;
    gain.gain.cancelScheduledValues(t);
    gain.gain.setValueAtTime(gain.gain.value, t);
    gain.gain.linearRampToValueAtTime(0.0, t + 0.4);
    setTimeout(() => { try { src.stop(); } catch (e) {} }, 450);
  } else {
    try { src.stop(); } catch (e) {}
  }
}

// -------- Gesture detection --------
let touchStartX = 0, touchStartY = 0, touchStartT = 0;
let touchInProgress = false;
let lastTapTime = 0;
let lastTwoFingerTapTime = 0;
let twoFinger = null;   // { startX, startY, startT, lastX, lastY } while a two-finger gesture is live
let gestureHandler = null;
let waitingForGesture = false;

// Helper so transitions into "waiting" reset stale touch data — prevents a
// touch that began on the Begin button or during narration from being read as
// the first gesture of the new phase.
function setWaiting(v) {
  waitingForGesture = v;
  if (v) {
    touchInProgress = false;
    twoFinger = null;
    lastTapTime = 0;
    lastTwoFingerTapTime = 0;
  }
}

function avgXY(touchList) {
  let x = 0, y = 0;
  for (const t of touchList) { x += t.clientX; y += t.clientY; }
  return { x: x / touchList.length, y: y / touchList.length };
}

function bindGestures() {
  // Bind on document so swipes that start near a screen edge (where iOS
  // tries to intercept for back-navigation) and pass through any element
  // still register.
  document.addEventListener('touchstart', onTouchStart, { passive: false });
  document.addEventListener('touchend', onTouchEnd, { passive: false });
  document.addEventListener('touchcancel', () => { touchInProgress = false; twoFinger = null; }, { passive: false });
  document.addEventListener('touchmove', onTouchMove, { passive: false });
}
function onTouchStart(e) {
  if (e.touches.length === 2) {
    const c = avgXY(e.touches);
    twoFinger = { startX: c.x, startY: c.y, startT: Date.now(), lastX: c.x, lastY: c.y };
    touchInProgress = false;
    return;
  }
  if (e.touches.length === 1 && !twoFinger) {
    const t = e.touches[0];
    touchStartX = t.clientX;
    touchStartY = t.clientY;
    touchStartT = Date.now();
    touchInProgress = true;
    return;
  }
  // More than two fingers — abort everything in flight.
  if (e.touches.length > 2) {
    twoFinger = null;
    touchInProgress = false;
  }
}
function onTouchMove(e) {
  if (twoFinger && e.touches.length >= 1) {
    const c = avgXY(e.touches);
    twoFinger.lastX = c.x;
    twoFinger.lastY = c.y;
  }
  if (waitingForGesture) e.preventDefault();
}
function onTouchEnd(e) {
  // Two-finger gesture resolves when all fingers leave the screen.
  if (twoFinger && e.touches.length === 0) {
    const tf = twoFinger;
    twoFinger = null;
    if (!waitingForGesture) return;

    const dx = tf.lastX - tf.startX;
    const dy = tf.lastY - tf.startY;
    const dt = Date.now() - tf.startT;
    const dist = Math.hypot(dx, dy);

    if (dist < TAP_MAX_DISTANCE && dt < TAP_MAX_TIME) {
      const now = Date.now();
      if (lastTwoFingerTapTime && now - lastTwoFingerTapTime < DOUBLE_TAP_WINDOW) {
        lastTwoFingerTapTime = 0;
        fireGesture('two-finger-double-tap');
      } else {
        const thisTap = now;
        lastTwoFingerTapTime = thisTap;
        setTimeout(() => { if (lastTwoFingerTapTime === thisTap) lastTwoFingerTapTime = 0; }, DOUBLE_TAP_WINDOW + 50);
      }
      return;
    }
    if (dist >= SWIPE_MIN_DISTANCE && Math.abs(dy) > Math.abs(dx)) {
      fireGesture(dy > 0 ? 'two-finger-swipe-down' : 'two-finger-swipe-up');
    }
    return;
  }

  // If a two-finger gesture is mid-lift (one finger up, one still down),
  // just wait for the rest of the fingers.
  if (twoFinger) return;

  // Single-finger end (existing logic)
  if (!waitingForGesture) { touchInProgress = false; return; }
  if (!touchInProgress) return;
  touchInProgress = false;

  const t = e.changedTouches[0];
  const dx = t.clientX - touchStartX;
  const dy = t.clientY - touchStartY;
  const dt = Date.now() - touchStartT;
  const dist = Math.hypot(dx, dy);

  if (dist < TAP_MAX_DISTANCE && dt < TAP_MAX_TIME) {
    const now = Date.now();
    if (lastTapTime && now - lastTapTime < DOUBLE_TAP_WINDOW) {
      lastTapTime = 0;
      fireGesture('double-tap');
    } else {
      const thisTap = now;
      lastTapTime = thisTap;
      setTimeout(() => { if (lastTapTime === thisTap) lastTapTime = 0; }, DOUBLE_TAP_WINDOW + 50);
    }
    return;
  }
  if (dist >= SWIPE_MIN_DISTANCE) {
    lastTapTime = 0;
    if (Math.abs(dx) > Math.abs(dy)) {
      fireGesture(dx > 0 ? 'swipe-right' : 'swipe-left');
    } else {
      fireGesture(dy > 0 ? 'swipe-down' : 'swipe-up');
    }
  }
}
function fireGesture(g) { if (gestureHandler) gestureHandler(g); }
function flashSuccess() {
  const a = document.getElementById('playArea');
  a.classList.remove('success');
  void a.offsetWidth;
  a.classList.add('success');
  setTimeout(() => a.classList.remove('success'), 750);
}

// -------- Game state --------
const gestureName = {
  'swipe-right': 'Swipe right',
  'swipe-left':  'Swipe left',
  'swipe-up':    'Swipe up',
  'swipe-down':  'Swipe down',
  'double-tap':  'Double tap',
  'two-finger-double-tap': 'Two-finger tap',
  'two-finger-swipe-up':   'Two fingers up',
  'two-finger-swipe-down': 'Two fingers down'
};
let streak = 0;
let scrapbook = [];
function updateBar() {
  const word = scrapbook.length === 1 ? 'memory' : 'memories';
  const text = scrapbook.length
    ? `${scrapbook.length} ${word}`
    : 'Scrapbook empty';
  document.getElementById('scrapbookBar').innerHTML =
    `${text} · Streak: <span class="streak">${streak}</span>`;
}
function scrapbookAdd(line) { scrapbook.push(line); updateBar(); }
function renderScrapbook() {
  const scroll = document.getElementById('scrapbookScroll');
  const list = document.getElementById('scrapbookList');
  list.innerHTML = '';
  scrapbook.forEach(line => {
    const li = document.createElement('li');
    li.textContent = line;
    list.appendChild(li);
  });
  scroll.hidden = scrapbook.length === 0;
}

// -------- Scene runner --------
let repromptTimer = null;
function setInstruction(text, hint = '') {
  document.getElementById('instruction').textContent = text;
  document.getElementById('hint').textContent = hint;
}
function clearReprompt() { if (repromptTimer) { clearTimeout(repromptTimer); repromptTimer = null; } }
function startReprompt(promptId) {
  clearReprompt();
  repromptTimer = setTimeout(() => {
    if (waitingForGesture && gestureHandler) speakLine(promptId);
  }, REPROMPT_AFTER);
}

function practiceGesture(target, introId, vignetteIds, onDone) {
  clearReprompt();
  // Prefetch every line this scene might say so playback is gapless.
  preloadAhead([
    introId, ...vignetteIds,
    cueId(target, true), cueId(target, false),
    repromptId(target), almostId(target)
  ]);
  const reps = vignetteIds.length;
  let count = 0;
  setWaiting(true);
  setInstruction(gestureName[target], `(${count} of ${reps})`);

  gestureHandler = (g) => {
    clearReprompt();
    if (g === target) {
      count++;
      streak++;
      updateBar();
      flashSuccess();
      sounds.success();
      const vId = vignetteIds[count - 1];
      if (count >= reps) {
        setWaiting(false);
        gestureHandler = null;
        setInstruction(gestureName[target], 'Done!');
        speakLine(vId, () => setTimeout(onDone, 400));
      } else {
        setInstruction(gestureName[target], `(${count} of ${reps})`);
        const isLast = reps - count === 1;
        speakSequence([vId, cueId(target, isLast)],
          () => startReprompt(repromptId(target)));
      }
    } else {
      sounds.almost();
      speakLine(almostId(target),
        () => startReprompt(repromptId(target)));
    }
  };

  speakLine(introId, () => startReprompt(repromptId(target)));
}

// -------- Chapter flow --------
function startChapter() {
  document.body.classList.remove('complete');
  document.body.classList.add('in-game');
  ensureAudio();
  loadVoices();
  streak = 0;
  scrapbook = [];
  updateBar();
  setTimeout(scene1, 400);
}

function scene1() {
  practiceGesture('swipe-right', 't-scene1-intro',
    ['t-scene1-vignette-1', 't-scene1-vignette-2', 't-scene1-vignette-3'],
    scene3);
}
function scene3() {
  scrapbookAdd('Walked east to the post office.');
  sounds.step();
  practiceGesture('swipe-left', 't-scene3-intro',
    ['t-scene3-vignette-1', 't-scene3-vignette-2', 't-scene3-vignette-3'],
    scene4);
}
function scene4() {
  scrapbookAdd('Walked back west to the harbour.');
  sounds.step();
  practiceGesture('swipe-up', 't-scene4-intro',
    ['t-scene4-vignette-1', 't-scene4-vignette-2', 't-scene4-vignette-3'],
    scene5);
}
function scene5() {
  scrapbookAdd('Looked up and watched the gulls.');
  practiceGesture('swipe-down', 't-scene5-intro',
    ['t-scene5-vignette-1', 't-scene5-vignette-2', 't-scene5-vignette-3'],
    scene6);
}
function scene6() {
  scrapbookAdd('Found a sea-smoothed stone on the path.');
  practiceGesture('double-tap', 't-scene6-intro-v2',
    ['t-scene6-vignette-1', 't-scene6-vignette-2', 't-scene6-vignette-3'],
    sceneInside);
}
function sceneInside() {
  practiceGesture('two-finger-double-tap', 't-inside-intro',
    ['t-inside-vignette-1', 't-inside-vignette-2', 't-inside-vignette-3'],
    scenePickup);
}
function scenePickup() {
  practiceGesture('two-finger-swipe-down', 't-pickup-intro',
    ['t-pickup-vignette-1', 't-pickup-vignette-2', 't-pickup-vignette-3'],
    sceneReach);
}
function sceneReach() {
  practiceGesture('two-finger-swipe-up', 't-reach-intro',
    ['t-reach-vignette-1', 't-reach-vignette-2', 't-reach-vignette-3'],
    scene7);
}
function scene7() {
  scrapbookAdd('Greeted three neighbours along the way.');
  setupMiniScene();
  speakLine('t-scene7-intro', () => startReprompt('t-mini-reprompt-walk'));
}

function setupMiniScene() {
  preloadAhead([
    't-scene7-intro', 't-mini-stage1', 't-mini-stage2',
    't-mini-bark-cue-v2', 't-mini-almost-swipe', 't-mini-almost-greet-v2',
    't-mini-reprompt-walk', 't-mini-reprompt-pickup-dog',
    'cue-again-swipe-right', 't-complete-v2'
  ]);
  let stage = 0;
  setWaiting(true);
  setInstruction('Find Pat\'s dog', 'Swipe right twice');

  gestureHandler = (g) => {
    clearReprompt();
    if (stage < 2) {
      if (g === 'swipe-right') {
        stage++;
        streak++;
        updateBar();
        flashSuccess();
        sounds.step();
        if (stage === 2) {
          setInstruction('Find Pat\'s dog', 'Listen…');
          speakLine('t-mini-stage2', () => {
            setTimeout(() => {
              sounds.bark();
              setTimeout(() => sounds.bark(), 350);
              setTimeout(() => {
                speakLine('t-mini-bark-cue-v2',
                  () => startReprompt('t-mini-reprompt-pickup-dog'));
                setInstruction('Find Pat\'s dog', 'Two fingers, swipe down to pick him up');
              }, 850);
            }, 300);
          });
        } else {
          setInstruction('Find Pat\'s dog', `Swipe right again (${stage} of 2)`);
          speakLine('t-mini-stage1',
            () => startReprompt('cue-again-swipe-right'));
        }
      } else {
        sounds.almost();
        speakLine('t-mini-almost-swipe',
          () => startReprompt('t-mini-reprompt-walk'));
      }
    } else {
      if (g === 'two-finger-swipe-down') {
        streak++;
        updateBar();
        flashSuccess();
        sounds.finale();
        setWaiting(false);
        gestureHandler = null;
        clearReprompt();
        setTimeout(chapterComplete, 1300);
      } else {
        sounds.almost();
        speakLine('t-mini-almost-greet-v2',
          () => startReprompt('t-mini-reprompt-pickup-dog'));
      }
    }
  };
}

function chapterComplete() {
  setWaiting(false);
  gestureHandler = null;
  clearReprompt();
  // Warm the wander intro + harbour content while the completion speech plays.
  preloadAhead([
    'w-intro-v2', 'w-edge-west', 'w-edge-east', 'w-nobody',
    'w-nothing-up', 'w-nothing-down', 'w-nothing-to-take', 'w-nothing-to-reach',
    'w-no-door', 'already-taken',
    'w-harbour-desc', 'w-harbour-up', 'w-harbour-down', 'w-harbour-pickup'
  ]);
  speakLine('t-complete-v2', () => enterWander(true));
}

// =============================================
// WANDER MODE — explore the village
// =============================================
let wanderMode = false;
let wanderIndex = 0;

const wanderPositions = [
  { id: 'harbour' },
  { id: 'bakery', door: true },
  { id: 'bridie', door: true, person: 'Bridie McGregor', greetCount: 3 },
  { id: 'post', door: true, person: 'Patrick O\'Donovan', greetCount: 3 },
  { id: 'school', door: true, person: 'Mr Breen', greetCount: 3 },
  { id: 'brian', person: 'Brian Blunt', greetCount: 3 },
  { id: 'chapel', door: true, person: 'Mary Mooney', greetCount: 3 },
  { id: 'catherine', door: true, person: 'Catherine O\'Reilly', greetCount: 3 },
  { id: 'doctor', person: 'Dr O\'Loughlin', greetCount: 3 },
  { id: 'pub', door: true, person: 'Barney', greetCount: 3 },
  { id: 'james', person: 'James', greetCount: 3, sound: 'bark' }
];

// Interior state when inside a place.
let insideId = null;
let insideState = 'door';
const pickedUp = {};

function instructionFooter() {
  if (insideId) return 'Walk · look · greet · two-finger tap to leave';
  return 'Swipe left or right to walk · Swipe up or down to look · Double tap to greet';
}

function pickupHere() {
  let id;
  if (insideId) id = `w-${insideId}-${insideState}-pickup`;
  else id = `w-${wanderPositions[wanderIndex].id}-pickup`;
  if (!LINES[id]) { speakLine('w-nothing-to-take'); return; }
  if (pickedUp[id]) { speakLine('already-taken'); return; }
  pickedUp[id] = true;
  flashSuccess();
  speakLine(id);
}
function reachHere() {
  let id;
  if (insideId) id = `w-${insideId}-${insideState}-reach`;
  else id = `w-${wanderPositions[wanderIndex].id}-reach`;
  if (!LINES[id]) { speakLine('w-nothing-to-reach'); return; }
  if (pickedUp[id]) { speakLine('already-taken'); return; }
  pickedUp[id] = true;
  flashSuccess();
  speakLine(id);
}
function enterInterior() {
  const pos = wanderPositions[wanderIndex];
  if (!pos.door) { speakLine('w-no-door'); return; }
  insideId = pos.id;
  insideState = 'door';
  flashSuccess();
  sounds.doorOpen();
  startAmbient(`amb-${insideId}`);
  const id = `w-${insideId}-door-desc`;
  setInstruction(LINES[id] || '', instructionFooter());
  speakLine(id);
}
function exitInterior() {
  insideId = null;
  insideState = 'door';
  flashSuccess();
  sounds.step();
  stopAmbient();
  const pos = wanderPositions[wanderIndex];
  const id = `w-${pos.id}-desc`;
  setInstruction(LINES[id] || '', instructionFooter());
}
function moveInside(delta) {
  if (delta > 0 && insideState === 'door') {
    insideState = 'deep';
    flashSuccess();
    sounds.step();
    const id = `w-${insideId}-deep-desc`;
    setInstruction(LINES[id] || '', instructionFooter());
    speakLine(id);
  } else if (delta < 0 && insideState === 'deep') {
    insideState = 'door';
    flashSuccess();
    sounds.step();
    const id = `w-${insideId}-door-desc`;
    setInstruction(LINES[id] || '', instructionFooter());
    speakLine(id);
  }
}
function lookInside(direction) {
  const id = `w-${insideId}-${insideState}-${direction}`;
  if (LINES[id]) speakLine(id);
  else speakLine(direction === 'up' ? 'w-nothing-up' : 'w-nothing-down');
}
function greetInside() {
  const id = `w-${insideId}-${insideState}-greet`;
  if (LINES[id]) speakLine(id);
  else speakLine('w-nobody');
}

function enterWander(skipIntro = false) {
  document.body.classList.remove('complete');
  document.body.classList.add('in-game');
  document.body.classList.add('is-wander');
  document.querySelector('#gameScreen .chapter-label').textContent = 'Wandering';
  document.querySelector('#gameScreen .chapter-title').textContent = 'Ballycrann';

  wanderMode = true;
  wanderIndex = 0;
  lastTapTime = 0;
  insideId = null;
  insideState = 'door';
  for (const k of Object.keys(pickedUp)) delete pickedUp[k];

  ensureAudio();
  const firstId = `w-${wanderPositions[0].id}-desc`;
  setInstruction(LINES[firstId] || '', instructionFooter());

  gestureHandler = handleWanderGesture;

  if (skipIntro) {
    setWaiting(true);
  } else {
    setWaiting(false);
    speakLine('w-intro-v2', () => { setWaiting(true); });
    setTimeout(() => { if (wanderMode) setWaiting(true); }, 12000);
  }
}

function handleWanderGesture(g) {
  if (insideId) {
    if (g === 'two-finger-double-tap') { exitInterior(); return; }
    if (g === 'two-finger-swipe-down')  { pickupHere(); return; }
    if (g === 'two-finger-swipe-up')    { reachHere(); return; }
    if (g === 'swipe-right')            { moveInside(+1); return; }
    if (g === 'swipe-left')             { moveInside(-1); return; }
    if (g === 'swipe-up')               { lookInside('up'); return; }
    if (g === 'swipe-down')             { lookInside('down'); return; }
    if (g === 'double-tap')             { greetInside(); return; }
    return;
  }
  if (g === 'two-finger-double-tap') { enterInterior(); return; }
  if (g === 'two-finger-swipe-down')  { pickupHere(); return; }
  if (g === 'two-finger-swipe-up')    { reachHere(); return; }
  if (g === 'swipe-right')            { moveWander(+1); return; }
  if (g === 'swipe-left')             { moveWander(-1); return; }
  if (g === 'swipe-up')               { lookAt('up'); return; }
  if (g === 'swipe-down')             { lookAt('down'); return; }
  if (g === 'double-tap')             { greetPerson(); return; }
}

function moveWander(delta) {
  const newIndex = wanderIndex + delta;
  if (newIndex < 0) { speakLine('w-edge-west'); return; }
  if (newIndex >= wanderPositions.length) { speakLine('w-edge-east'); return; }
  wanderIndex = newIndex;
  sounds.step();
  flashSuccess();
  const pos = wanderPositions[wanderIndex];
  const descId = `w-${pos.id}-desc`;
  setInstruction(LINES[descId] || '', instructionFooter());
  // Prefetch everything the player can do from this position.
  preloadAhead([
    descId, `w-${pos.id}-up`, `w-${pos.id}-down`,
    `w-${pos.id}-pickup`, `w-${pos.id}-reach`
  ]);
  if (pos.greetCount) {
    for (let i = 1; i <= pos.greetCount; i++) loadLineAudio(`w-${pos.id}-greet-${i}`);
  }
  if (pos.door) {
    loadLineAudio(`amb-${pos.id}`);
    for (const state of ['door', 'deep']) {
      for (const k of ['desc','up','down','greet','pickup','reach']) {
        loadLineAudio(`w-${pos.id}-${state}-${k}`);
      }
    }
  }
  if (pos.sound && sounds[pos.sound]) sounds[pos.sound]();
  speakLine(descId);
}

function lookAt(direction) {
  const pos = wanderPositions[wanderIndex];
  const id = `w-${pos.id}-${direction}`;
  if (LINES[id]) speakLine(id);
  else speakLine(direction === 'up' ? 'w-nothing-up' : 'w-nothing-down');
}

function greetPerson() {
  const pos = wanderPositions[wanderIndex];
  if (!pos.person) { speakLine('w-nobody'); return; }
  if (pos.sound && sounds[pos.sound]) sounds[pos.sound]();
  const n = pos.greetCount || 3;
  const i = Math.floor(Math.random() * n) + 1;
  speakLine(`w-${pos.id}-greet-${i}`);
}

function exitWander() {
  cancelCurrent();
  stopAmbient();
  insideId = null;
  insideState = 'door';
  wanderMode = false;
  setWaiting(false);
  gestureHandler = null;
  document.body.classList.remove('is-wander');
  document.body.classList.remove('in-game');
  document.body.classList.add('complete');
  renderScrapbook();
  // Restore tutorial header in case they replay
  document.querySelector('#gameScreen .chapter-label').textContent = 'Tutorial';
  document.querySelector('#gameScreen .chapter-title').textContent = 'A Morning Walk';
}

// -------- Wire up --------
async function beginTutorial() {
  ensureAudio();
  preloadSounds();
  // iOS speech "warmup": needs a user-gesture-initiated utterance to unlock
  if ('speechSynthesis' in window) {
    const warm = new SpeechSynthesisUtterance(' ');
    warm.volume = 0;
    speechSynthesis.speak(warm);
  }
  bindGestures();
  await loadLines();
  // Only warm the first scene's lines so the user hears Mary instantly on a
  // cold load. Every subsequent scene + wander step prefetches its own lines
  // when entered — see practiceGesture, moveWander, enterInterior.
  preloadAhead([
    't-scene1-intro',
    't-scene1-vignette-1', 't-scene1-vignette-2', 't-scene1-vignette-3',
    'cue-once-more-swipe-right', 'cue-again-swipe-right',
    'reprompt-swipe-right', 'almost-swipe-right'
  ]);
  startChapter();
}
document.getElementById('startScreen').addEventListener('click', beginTutorial, { once: true });
document.getElementById('replayBtn').addEventListener('click', startChapter);
document.getElementById('wanderBtn').addEventListener('click', enterWander);
document.getElementById('wanderDoneBtn').addEventListener('click', exitWander);

updateBar();
</script>
